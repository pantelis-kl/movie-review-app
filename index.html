<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/8365c3ba4d.js" crossorigin="anonymous"></script>
</head>
<body>
    <form class="movies-form">
    <header>
        <navbar>
            <ul>
                <li><a href="#search-movie" class="navbar-item">Search Movie <i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="#reviews" class="navbar-item">Reviews <i class="fa-solid fa-star"></i></a></li>
                <li><a href="#top-rated" class="navbar-item">Top Rated <i class="fa-solid fa-ranking-star"></i></a></li>
            </ul>
        </navbar>
    </header>
    <section id="search-movie">
        <h3 id="search-movies-header">Search all of your favourite movies here</h3>
        <div class="search-container">
            <input type="search" id="search-input" placeholder="search movie">
            <i class="fa-solid fa-magnifying-glass" id="search-button"></i>
        </div>
        <h3 id="error-message"></h3>
        <span class="full-loading"><h3 id="loading-message">Loading</h3><h3 id="loading-dots">...</h3></span>
    </section>
    <main>
        <div class="movies-container">
            <h1 id="movie-name"></h1>
            <div class="image-text-container">
                <img id="movie-image">
                <h3 id="movie-description"></h3>
            </div>
        </div>
    </main>
    </form>
    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
