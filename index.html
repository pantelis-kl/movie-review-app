<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/8365c3ba4d.js" crossorigin="anonymous"></script>
</head>
<body>
    <form class="movies-form">
    <header>
        <navbar>
            <ul>
                <li><a href="#search-movie" class="navbar-item" id="search-movie-link">Search Movie <i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="#reviews" class="navbar-item">Reviews <i class="fa-solid fa-star"></i></a></li>
                <li><a href="#top-rated" class="navbar-item" id="top-rated-link">Top Rated <i class="fa-solid fa-ranking-star"></i></a></li>
                <li><a href="#releated" class="navbar-item">Releated <i class="fa-solid fa-clapperboard"></i></a></li>
            </ul>
        </navbar>
    </header>
    <section id="search-movie">
        <h3 id="search-movies-header">Search all of your favourite movies here</h3>
        <div class="search-container">
            <input type="search" id="search-input" placeholder="search movie">
            <i class="fa-solid fa-magnifying-glass" id="search-button"></i>
        </div>
        <h3 id="error-message"></h3>
        <span class="full-loading"><h3 id="loading-message">Loading</h3><h3 id="loading-dots">...</h3></span>
    </section>
    <main>
        <div class="movies-container">
            <h1 id="movie-name"></h1>
            <div class="image-text-container">
                <img id="movie-image">
                <h3 id="movie-description"></h3>
            </div>
            <div class="movie-details">
                <h3 id="release-date"></h3>
                <h3 id="runtime"></h3>
                <h3 id="producer-name"></h3>
            </div>
            <a href="#trailer" id="trailer-link">Watch Trailer <i class="fa-brands fa-youtube"></i></a>
            <iframe controls allowfullscreen id="trailer-video"></iframe>
            <h1 id="reviews-header">Reviews</h1>
            <section id="reviews">
                <div class="review-stats">
                    <h3 id="total-reviews"></h3>
                    <h3 id="rating"></h3>
                </div>
                <div class="review-authors">
                    <h2 id="review-authors-header"></h2>
                <div class="review-item">
                    <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
                <div class="review-item">
                     <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
                <div class="review-item">
                     <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
                <div class="review-item">
                     <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
                <div class="review-item">
                     <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
                <div class="review-item">
                     <div class="rating-name-cont">
                        <img class="authors-image">
                        <h3 class="authors-name"></h3>
                        <h3 class="authors-rating"></h3>
                    </div>
                    <h3 class="comment-content"></h3>
                    <h3 class="created-at"></h3>
                </div>
            </div>
            </section>
        </div>
    </main>
    <section id="top-rated">
        <h1 id="top-rated-header">Top Rated Movies</h1>
        <div class="top-rated-container">

        </div>
    </section>
    <section id="releated">
    <footer>
        <h1 id="releated-movies-header">Releated Movies</h1>
        <div class="releated-movies-container">
            
        </div>
    </footer>
    </section>
    </form>
    <script src="config.js"></script>
    <script src="index.js" type="module"></script>
</body>
</html>
